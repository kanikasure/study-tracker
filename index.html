<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Study Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>📚 Study Tracker</h1>

  <!-- SECTION 1: Add a subject -->
  <section id="subject-section">
    <input type="text" id="subject-input" placeholder="Enter subject name" autocomplete="off"/>
    <button id="add-subject-btn">Add Subject</button>
    <ul id="subject-list"></ul>
  </section>

  <!-- SECTION 2: Timer -->
  <section id="timer-section">
    <p>Currently studying: <span id="current-subject">None</span></p>
    <div id="timer-display">00:00:00</div>
    <button id="start-btn">Start</button>
    <button id="stop-btn">Stop</button>
  </section>

  <!-- SECTION 3: Today's Log -->
  <section id="log-section">
    <h2>Today's Sessions</h2>
    <ul id="session-log"></ul>
    <p>Total: <span id="total-time">0h 0m</span></p>
  </section>

  <!-- SECTION 4: Daily Summary -->
<section id="summary-section">
  <h2>Today's Summary</h2>
  <canvas id="dailyChart"></canvas>
  <p id="no-data-msg">No sessions yet today.</p>
</section>

<!-- SECTION 5: Weekly Summary -->
<section id="weekly-section">
  <h2>Weekly Summary</h2>
  <canvas id="weeklyChart"></canvas>
  <p id="no-weekly-msg">No sessions this week yet.</p>
</section>

  <script src="app.js"></script>
</body>
</html>
